server:
  port: 8080

spring:

  application:
    name: product

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_DB}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    baseline-on-migrate: true
    schemas: products

  jpa:
    properties:
      hibernate:
        default_schema: products

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,caches
  metrics:
    cache:
      instrument: true
